    <script>
        const bg = document.getElementById('flash-bg');
        const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff'];
        setInterval(() => {
            bg.style.background = `linear-gradient(135deg, ${colors[Math.floor(Math.random()*6)]}, ${colors[Math.floor(Math.random()*6)]})`;
        }, 1000);

        const tBtn = document.getElementById('theme-btn');
        tBtn.onclick = () => {
            document.body.classList.toggle('dark-mode');
            tBtn.innerText = document.body.classList.contains('dark-mode') ? '🌙' : '☀️';
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        };
        if(localStorage.getItem('theme') === 'dark') tBtn.onclick();

        document.getElementById('mq-content').innerHTML += document.getElementById('mq-content').innerHTML;

        const music = document.getElementById('bg-music');
        const mBtn = document.getElementById('music-btn');
        mBtn.onclick = () => {
            if (music.paused) { music.play(); mBtn.innerText = '❚❚'; }
            else { music.pause(); mBtn.innerText = '♪'; }
        };
        document.addEventListener('click', () => { if(music.paused) music.play().then(()=>mBtn.innerText='❚❚').catch(()=>{}); }, {once: true});

        const PROXY_URL = 'https://proxy.dsocks.uk/?url=';
        
        const SOURCES = {
            lineA: 'https://ccbaohe.com/appleID/',
            lineB: 'https://shadowrocket.best/api/accounts',
            lineC: 'https://www.lanhaiblog.com/post/3.html'
        };

        let allAccounts = [];

        window.addEventListener('load', fetchAllSources);

        // 生成过去1-60分钟内的随机时间
        function getRandomPastTime() {
            const now = new Date();
            const minutesAgo = Math.floor(Math.random() * 60) + 1;
            now.setMinutes(now.getMinutes() - minutesAgo);
            return now.toLocaleString('zh-CN', { hour12: false });
        }

        async function fetchAllSources() {
            document.getElementById('loading-spinner').style.display = 'flex';
            document.getElementById('error-message').style.display = 'none';
            
            allAccounts = [];
            
            try {
                await Promise.all([
                    fetchLineA().catch(err => console.log('线路A失败:', err)),
                    fetchLineB().catch(err => console.log('线路B失败:', err)),
                    fetchLineC().catch(err => console.log('线路C失败:', err))
                ]);
                
                const uniqueAccounts = [];
                const emailSet = new Set();
                
                allAccounts.forEach(acc => {
                    if (!emailSet.has(acc.email)) {
                        emailSet.add(acc.email);
                        uniqueAccounts.push(acc);
                    }
                });
                
                allAccounts = uniqueAccounts;
                
                allAccounts.sort((a, b) => {
                    const timeA = new Date(a.time).getTime();
                    const timeB = new Date(b.time).getTime();
                    if (isNaN(timeA) && isNaN(timeB)) return 0;
                    if (isNaN(timeA)) return 1;
                    if (isNaN(timeB)) return -1;
                    return timeB - timeA;
                });

                if (allAccounts.length === 0) throw new Error('暂无可用账号');
                
                renderAccounts(allAccounts);
                
            } catch (err) {
                console.error('获取账号失败:', err);
                document.getElementById('error-message').style.display = 'block';
                document.getElementById('error-message').innerText = '加载失败，请稍后重试。' + err.message;
            } finally {
                document.getElementById('loading-spinner').style.display = 'none';
            }
        }

        async function fetchLineA() {
            const response = await fetch(PROXY_URL + encodeURIComponent(SOURCES.lineA));
            const html = await response.text();
            
            const accounts = [];
            
            function cfDecode(e) {
                var r = parseInt(e.substr(0, 2), 16), n, i, a = "";
                for (n = 2; n < e.length; n += 2) {
                    i = parseInt(e.substr(n, 2), 16) ^ r;
                    a += String.fromCharCode(i);
                }
                return a;
            }
            
            const cardRegex = /col-lg-3.*?data-cfemail="([a-f0-9]+)".*?copy\('([^']+)'\)/gs;
            let match;
            while ((match = cardRegex.exec(html)) !== null) {
                accounts.push({
                    email: cfDecode(match[1]),
                    password: match[2],
                    status: '正常',
                    time: getRandomPastTime(),
                    source: '线路A'
                });
            }
            
            allAccounts = allAccounts.concat(accounts);
            return accounts;
        }

        async function fetchLineB() {
            const response = await fetch(SOURCES.lineB);
            const data = await response.json();
            
            const accounts = [];
            if (data && Array.isArray(data.id)) {
                data.id.forEach(item => {
                    accounts.push({
                        email: item.email,
                        password: item.password,
                        status: item.status || '正常',
                        time: item.time || getRandomPastTime(),
                        source: '线路B'
                    });
                });
            }
            
            allAccounts = allAccounts.concat(accounts);
            return accounts;
        }

        async function fetchLineC() {
            const response = await fetch(PROXY_URL + encodeURIComponent(SOURCES.lineC));
            const html = await response.text();
            
            const accounts = [];
            
            const cardRegex = /user-card.*?data-clipboard-text="([^"]+)".*?data-clipboard-text="([^"]+)"/gs;
            let match;
            while ((match = cardRegex.exec(html)) !== null) {
                accounts.push({
                    email: match[1],
                    password: match[2],
                    status: '正常',
                    time: getRandomPastTime(),
                    source: '线路C'
                });
            }
            
            allAccounts = allAccounts.concat(accounts);
            return accounts;
        }

        function renderAccounts(accounts) {
            const grid = document.getElementById('accounts-grid');
            grid.innerHTML = '';

            accounts.forEach(acc => {
                let displayEmail = acc.email;


                const card = document.createElement('div');
                card.className = 'account-card';
                card.innerHTML = `
                    <div class="account-email" title="${acc.email}">${displayEmail}</div>
                    <div class="account-meta">
                        <span><i class="bi bi-check-circle-fill text-success"></i> ${acc.status || '正常'}</span>
                        <span>${acc.time || '刚刚'}</span>
                    </div>
                    <div class="account-btns">
                        <button class="copy-btn" onclick="copyToClipboard('${acc.email}')"><i class="fa fa-copy"></i> 复制账号</button>
                        <button class="copy-btn" onclick="copyToClipboard('${acc.password}')"><i class="fa fa-key"></i> 复制密码</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        window.copyToClipboard = function(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            alert('✅ 已复制到剪贴板');
        };
